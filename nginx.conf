server {
    listen 80;
    server_name agnes-ai.hfsoso.fun;

    # 前端静态资源
    root /usr/share/nginx/html;
    index index.html;

    # ===== 代理：SenseNova API =====
    # /sensenova-api → https://token.sensenova.cn
    location /sensenova-api/ {
        proxy_pass https://token.sensenova.cn/;
        # 显式传递 Authorization 头，确保 API Key 不被丢弃
        proxy_pass_request_headers on;
        proxy_set_header Host token.sensenova.cn;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # ===== 代理：智谱 AI API =====
    # /zhipu-api → https://open.bigmodel.cn
    location /zhipu-api/ {
        proxy_pass https://open.bigmodel.cn/;
        proxy_pass_request_headers on;
        proxy_set_header Host open.bigmodel.cn;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # ===== 代理：图片下载（绕过跨域）=====
    # /image-proxy → https://platform-outputs.agnes-ai.space
    location /image-proxy/ {
        proxy_pass https://platform-outputs.agnes-ai.space/;
        proxy_pass_request_headers on;
        proxy_set_header Host platform-outputs.agnes-ai.space;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # ===== SPA 回退 =====
    location / {
        try_files $uri $uri/ /index.html;
    }
}
